version: '3.8'

services:
  mysql:
    image: swr.cn-north-4.myhuaweicloud.com/library/mysql:8.0
    container_name: ca-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: CA
      MYSQL_USER: ca_user
      MYSQL_PASSWORD: ca_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./config/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - ca-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ca-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./keys:/app/keys
      - ./certificates:/app/certificates
      - ./performance_test:/app/performance_test
    networks:
      - ca-network
    command: python server.py

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: ca-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
      - SERVER_HOST=server
      - SERVER_PORT=8888
      - DOCKER_ENV=true
    volumes:
      - ./client:/app
      - ./client/keys:/app/keys
    networks:
      - ca-network
    stdin_open: true
    tty: true
    command: python CAGM.py

networks:
  ca-network:
    driver: bridge

volumes:
  mysql_data: